version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./server/app:/app/app
      - ./ml/models:/app/ml/models
      - ./client:/app/../client
    env_file:
      - server/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://handtalk:handtalk@db:5432/handtalk
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: handtalk
      POSTGRES_PASSWORD: handtalk
      POSTGRES_DB: handtalk
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U handtalk"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
